<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Games</title>
  <meta http-equiv="refresh" content="0; url=/Games/" />
  <link rel="canonical" href="https://sayaka-4987.github.io/Games/" />
  <script>
    // Keep query/hash when redirecting from lowercase alias to canonical path.
    (function () {
      var target = '/Games/' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/Games/">/Games/</a> ...</p>
</body>
</html>
