header-img: "img/404-bg.jpg"
permalink: /offline.html

<!-- Page Header -->
{% assign header_image = page['header-img'] | default: site['header-img'] %}
<header class="intro-header">
	{% if header_image %}
	<div class="intro-header-media" aria-hidden="true">
		<img src="{{ site.baseurl }}/{{ header_image | remove_first: '/' }}" alt="" loading="eager" decoding="async" fetchpriority="high">
	</div>
	{% endif %}
	<div class="container">
		<div class="row">
			<div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
				<div class="site-heading with-header-shadow" id="tag-heading">
					<h1>Offline</h1>
					<span class="subheading">{{ page.description }}</span>
				</div>
			</div>
		</div>
	</div>
</header>

<script>
	document.body.classList.add('page-fullscreen');
</script>
